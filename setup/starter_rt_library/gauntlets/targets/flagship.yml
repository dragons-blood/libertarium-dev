# Frontier flagship targets for THE GAUNTLET
# Every entry is one speedrun target. The agent picks an attack technique
# per target and tries to hit any of the preset's success markers.
#
# Fields:
#   id       — stable identifier used in reports and filenames
#   name     — display name on the scoreboard
#   provider — anthropic | openai | google | xai | meta | mistral | qwen | zhipu | ...
#   model    — canonical model string (used by rt_send.py and the agent)
#   api      — how to reach it: "native" | "openrouter" | "web"
#   endpoint — optional: override API URL (for openrouter aliases etc.)

